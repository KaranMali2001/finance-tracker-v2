version: "3"

vars:
  BACKEND_DIR: backend
  FRONTEND_DIR: finance-tracker-web
  DEV_COMPOSE: docker-compose.dev.yml
  PROD_COMPOSE: docker-compose.prod.yml

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # ── Install ────────────────────────────────────────────────────────────────

  install:
    desc: Install dependencies for both frontend and backend
    cmds:
      - task: install:backend
      - task: install:frontend

  install:backend:
    desc: Install Go dependencies
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - go mod download

  install:frontend:
    desc: Install frontend dependencies
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - pnpm install

  # ── Development ────────────────────────────────────────────────────────────

  dev:
    desc: Start postgres + worker container, then run backend (Air), frontend, and worker logs in parallel
    cmds:
      - task: services:up
      - task --parallel dev:backend dev:frontend dev:worker:logs

  dev:worker:logs:
    desc: Stream SAM worker Lambda logs
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - docker compose -f {{.DEV_COMPOSE}} logs -f sam
    interrupt: true

  dev:backend:
    desc: Run backend HTTP server with Air hot-reload
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - ENV_FILE=.env.dev air
    interrupt: true

  dev:frontend:
    desc: Run Next.js development server
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - pnpm dev
    interrupt: true

  dev:worker:
    desc: Rebuild and restart the SAM local Lambda container
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - docker compose -f {{.DEV_COMPOSE}} up -d --build sam

  # ── Build ──────────────────────────────────────────────────────────────────

  build:
    desc: Build backend binaries and frontend
    cmds:
      - task: build:backend
      - task: build:worker
      - task: build:frontend

  build:backend:
    desc: Build backend HTTP server binary (linux/amd64, for Docker)
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - CGO_ENABLED=0 GOOS=linux go build -trimpath -ldflags="-s -w" -o bin/bootstrap ./cmd/backend/*.go

  build:worker:
    desc: Build worker Lambda binary (linux/arm64, for SAM / Lambda)
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o bin/worker-bootstrap ./cmd/worker/*.go

  build:frontend:
    desc: Build Next.js frontend for production
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - pnpm build

  # ── Production ─────────────────────────────────────────────────────────────

  prod:backend:
    desc: Run backend in production mode
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - ENV_FILE=.env.prod go run ./cmd/backend/*.go
    interrupt: true

  prod:frontend:
    desc: Build and start frontend for production
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - pnpm build
      - pnpm start
    interrupt: true

  # ── Dev services (postgres + worker Lambda + chartdb) ─────────────────────

  services:up:
    desc: Start postgres, SAM local Lambda, and chartdb for local Air dev
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - docker compose -f {{.DEV_COMPOSE}} up -d --build

  services:down:
    desc: Stop all dev services
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - docker compose -f {{.DEV_COMPOSE}} down

  services:logs:
    desc: Stream logs from all dev services
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - docker compose -f {{.DEV_COMPOSE}} logs -f

  services:restart:
    desc: Rebuild and restart all dev services
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - docker compose -f {{.DEV_COMPOSE}} up -d --build

  services:ps:
    desc: Show status of all dev service containers
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - docker compose -f {{.DEV_COMPOSE}} ps

  # ── Prod infra (postgres + backend + worker — fully containerised) ─────────

  prod:up:
    desc: Build and start the full production stack in Docker
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - docker compose -f {{.PROD_COMPOSE}} up -d --build

  prod:down:
    desc: Stop and remove all production containers
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - docker compose -f {{.PROD_COMPOSE}} down

  prod:logs:
    desc: Stream logs from all production containers
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - docker compose -f {{.PROD_COMPOSE}} logs -f

  prod:restart:
    desc: Rebuild and restart backend and worker production containers
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - docker compose -f {{.PROD_COMPOSE}} up -d --build backend worker

  prod:ps:
    desc: Show status of all production containers
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - docker compose -f {{.PROD_COMPOSE}} ps

  # ── Docs ───────────────────────────────────────────────────────────────────

  docs:generate:
    desc: Regenerate Swagger spec and frontend API types
    cmds:
      - task: docs:generate:backend
      - task: docs:generate:frontend

  docs:generate:backend:
    desc: Generate Swagger spec from handler annotations
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - swag init -g cmd/backend/main.go -o internal/docs --parseDependency --parseInternal

  docs:generate:frontend:
    desc: Generate TypeScript API client from Swagger spec
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - pnpm run generate:api

  # ── Frontend ───────────────────────────────────────────────────────────────

  frontend:build:
    desc: Build Next.js application for production
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - pnpm build

  frontend:type-check:
    desc: Type check Next.js TypeScript files
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - pnpm exec tsc --noEmit

  frontend:lint:
    desc: Lint Next.js application using Biome
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - pnpm lint

  frontend:format:
    desc: Format Next.js code using Biome and Prettier
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - pnpm format

  frontend:clean:
    desc: Clean Next.js build artifacts and cache
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - rm -rf .next
      - rm -rf node_modules/.cache

  # ── Code quality ───────────────────────────────────────────────────────────

  lint:
    desc: Lint frontend
    cmds:
      - task: frontend:lint

  format:
    desc: Format frontend code
    cmds:
      - task: frontend:format

  type-check:
    desc: Type check frontend
    cmds:
      - task: frontend:type-check

  clean:
    desc: Clean all build artifacts
    cmds:
      - task: frontend:clean
